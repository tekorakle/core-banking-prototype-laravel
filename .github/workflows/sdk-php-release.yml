name: FinAegis PHP SDK Release

on:
  push:
    tags:
      - 'php-sdk-v*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Packagist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install dependencies
        working-directory: sdks/php
        run: composer install --no-dev

      - name: Notify Packagist
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          curl -X POST "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://github.com/FinAegis/php-sdk"}}'

      - name: Summary
        run: |
          echo "## FinAegis PHP SDK Published" >> $GITHUB_STEP_SUMMARY
          echo "Install: \`composer require finaegis/php-sdk\`" >> $GITHUB_STEP_SUMMARY
